<ion-app>
  <ion-menu contentId="main-content" type="overlay">
    <ion-header>
      <ion-toolbar color="danger">
        <ion-title>AutoLens</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list lines="none">
        <ion-item button routerLink="/perfil" routerDirection="forward">
          <ion-icon slot="start" name="person-outline"></ion-icon>
          <ion-label>Mi Perfil</ion-label>
        </ion-item>

        <ion-item button (click)="showAbout()">
          <ion-icon slot="start" name="information-circle-outline"></ion-icon>
          <ion-label>Quiénes Somos</ion-label>
        </ion-item>

        <ion-divider></ion-divider>

        <ion-item button (click)="logout()" class="logout-item">
          <ion-icon slot="start" name="log-out-outline" color="danger"></ion-icon>
          <ion-label color="danger">Cerrar Sesión</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <div class="ion-page" id="main-content">
    <ion-router-outlet></ion-router-outlet>
  </div>
</ion-app>

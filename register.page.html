<ion-content [fullscreen]="true" class="auth-bg">
  <div class="auth-container">
    
    <div class="header-section">
      <div class="logo-wrapper">
        <ion-icon name="car-sport" class="logo-icon"></ion-icon>
      </div>
      <h1 class="app-title">AutoLens</h1>
      <p class="app-subtitle">Crea tu credencial de acceso</p>
    </div>

    <form class="form-section" [formGroup]="registerForm" (ngSubmit)="register()">
      
      <ion-item lines="none" class="custom-input">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input type="text" formControlName="nombre" placeholder="Nombre completo"></ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-input">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input type="email" formControlName="email" placeholder="Correo electrónico"></ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-input">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        
        <ion-input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Contraseña"></ion-input>
        
        <ion-icon 
          [name]="showPassword ? 'eye-outline' : 'eye-off-outline'" 
          slot="end" 
          class="password-eye"
          (click)="togglePassword()">
        </ion-icon>
      </ion-item>

      <ion-button expand="block" type="submit" class="primary-btn" shape="round">
        REGISTRARSE
        <ion-icon name="checkmark-circle-outline" slot="end"></ion-icon>
      </ion-button>
    </form>

    <div class="divider">
      <span>O regístrate con</span>
    </div>

    <ion-button expand="block" fill="outline" class="google-btn" shape="round" (click)="loginWithGoogle()">
  <ion-icon name="logo-google" slot="start"></ion-icon>
  Google
</ion-button>

    <div class="footer-section">
      <p>¿Ya tienes tu matrícula? <a routerLink="/login">Inicia sesión</a></p>
    </div>

  </div>
</ion-content>

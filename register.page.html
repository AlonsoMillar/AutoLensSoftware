<ion-content [fullscreen]="true" class="auth-bg">
  <div class="auth-container">
    
    <div class="header-section">
      <div class="logo-wrapper">
        <ion-icon name="person-add-outline" class="logo-icon"></ion-icon>
      </div>
      <h1 class="app-title">Crear Cuenta</h1>
      <p class="app-subtitle">Únete a AutoLens</p>
    </div>

    <div class="form-section">
      <ion-item lines="none" class="custom-input">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input type="text" placeholder="Nombre completo" [(ngModel)]="nombre"></ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-input">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input type="email" placeholder="Correo electrónico" [(ngModel)]="email"></ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-input">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input [type]="passwordType" placeholder="Contraseña" [(ngModel)]="password"></ion-input>
        <ion-icon [name]="passwordIcon" slot="end" class="password-eye" (click)="togglePassword()"></ion-icon>
      </ion-item>

      <ion-button expand="block" class="primary-btn" shape="round" (click)="registerLocal()">
        REGÍSTRATE
        <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
      </ion-button>
    </div>

    <div class="footer-section" style="margin-top: 30px;">
      <p>¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión</a></p>
    </div>

  </div>
</ion-content>
